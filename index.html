<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cities Beneath the Sea Adventure</title>

<style>

body{
font-family:Arial;
background:linear-gradient(#0093E9,#80D0C7);
text-align:center;
margin:0;
padding:0;
}

h1{
color:white;
margin-top:20px;
}

#gameBoard{
display:grid;
grid-template-columns:repeat(6,80px);
grid-gap:5px;
justify-content:center;
margin:30px auto;
}

.square{
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
border-radius:12px;
box-shadow:0 4px 0 rgba(0,0,0,0.2);
}

.yellow{background:#FFD93D;}
.purple{background:#7B61FF;color:white;}
.blue{background:#3EC5FF;}
.orange{background:#FF8C42;}

#player{
font-size:30px;
position:absolute;
transition:0.3s;
}

#diceBtn{
padding:12px 25px;
font-size:18px;
background:#ffcc00;
border:none;
border-radius:10px;
cursor:pointer;
}

#dice{
font-size:30px;
margin:10px;
}

#score{
font-size:20px;
color:white;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
display:none;
width:300px;
}

button.option{
display:block;
width:100%;
margin:5px;
padding:8px;
}

</style>
</head>

<body>

<h1>🌊 Cities Beneath the Sea Adventure</h1>

<div id="score">Score: 0</div>

<div id="dice">🎲</div>
<button id="diceBtn">Roll Dice</button>

<div id="gameBoard"></div>

<div id="questionBox" class="popup">
<h3 id="questionText"></h3>
<div id="answers"></div>
</div>

<script>

const board=document.getElementById("gameBoard")

let colors=["yellow","purple","blue","orange"]

for(let i=36;i>=1;i--){

let square=document.createElement("div")
square.className="square "+colors[i%4]
square.id="sq"+i
square.innerText=i

board.appendChild(square)

}

let playerPos=1
let score=0

let snakes={
12:5,
22:14,
31:19
}

let ladders={
3:10,
11:18,
20:28
}

const questions=[

{
q:"What are underwater cities used for?",
a:["Studying marine life","Building hotels","Growing crops"],
correct:0
},

{
q:"Who works in underwater habitats?",
a:["Astronauts","Marine scientists","Farmers"],
correct:1
},

{
q:"What equipment does a diver need?",
a:["Oxygen tank","Umbrella","Helmet"],
correct:0
},

{
q:"What is marine life?",
a:["Animals in the sea","Animals in the forest","Birds"],
correct:0
},

{
q:"What vehicle explores deep ocean?",
a:["Submarine","Car","Helicopter"],
correct:0
}

]

const questionSquares=[5,9,15,21,27]

function movePlayer(){

let square=document.getElementById("sq"+playerPos)

square.innerHTML=playerPos+" 🤿"

}

movePlayer()

document.getElementById("diceBtn").onclick=function(){

let roll=Math.floor(Math.random()*6)+1

document.getElementById("dice").innerText="🎲 "+roll

document.getElementById("sq"+playerPos).innerText=playerPos

playerPos+=roll

if(playerPos>36)playerPos=36

if(snakes[playerPos]){

alert("🐍 Oh no! Snake!")

playerPos=snakes[playerPos]

}

if(ladders[playerPos]){

alert("🪜 Ladder! Climb up!")

playerPos=ladders[playerPos]

}

movePlayer()

if(questionSquares.includes(playerPos)){

showQuestion()

}

if(playerPos===36){

alert("🏆 Adventure Complete! Score:"+score)

}

}

function showQuestion(){

let q=questions[Math.floor(Math.random()*questions.length)]

document.getElementById("questionBox").style.display="block"

document.getElementById("questionText").innerText=q.q

let ans=document.getElementById("answers")

ans.innerHTML=""

q.a.forEach((option,index)=>{

let btn=document.createElement("button")

btn.className="option"

btn.innerText=option

btn.onclick=function(){

if(index===q.correct){

score+=10

alert("Correct! +10")

}else{

alert("Wrong! Move back")

playerPos--

}

document.getElementById("score").innerText="Score: "+score

document.getElementById("questionBox").style.display="none"

movePlayer()

}

ans.appendChild(btn)

})

}

</script>

</body>
</html>
