<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cities Beneath the Sea Adventure Game - AI Powered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, getDocs, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Inisialisasi fail-safe
        let app, auth, db;
        let firebaseEnabled = false;
        let appId = 'coral-adventure-ai-v2';
        const apiKey = ""; // API Key Gemini

        // Semakan konfigurasi Firebase yang lebih selamat
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const config = JSON.parse(__firebase_config);
                app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                if (typeof __app_id !== 'undefined') appId = __app_id;
                firebaseEnabled = true;
                console.log("Firebase sedia.");
            }
        } catch (e) {
            console.warn("Mod Lokal Aktif: Firebase tidak dikesan.");
        }

        // State Global
        let playerPos = 1;
        let score = 0;
        let studentName = "";
        let studentClass = "";
        let isRolling = false;
        let timerSeconds = 10;
        let timerInterval;
        let currentActiveQuestion = null;
        const TEACHER_PASSWORD = "cikgu123"; 

        // Integrasi AI Gemini
        async function callGemini(prompt, systemInstruction = "") {
            if (!apiKey) return "AI sedang offline (Tiada API Key).";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "AI tiada jawapan.";
            } catch (e) {
                return "Maaf, ralat sambungan AI.";
            }
        }

        // Konfigurasi Game
        const boardSize = 36;
        const snakes = { 12: 5, 22: 14, 31: 19 };
        const ladders = { 3: 10, 11: 18, 20: 28 };
        const questionTiles = [2, 6, 8, 13, 15, 17, 21, 23, 25, 27, 29, 32, 33, 34, 35];
        const vocabTiles = [4, 9, 16, 24, 30];

        const questions = [
            { q: "What are underwater cities mainly used for?", options: ["Studying marine life", "Growing crops", "Building hotels"], correct: 0 },
            { q: "Who lives in underwater habitats?", options: ["Astronauts", "Marine scientists", "Farmers"], correct: 1 },
            { q: "Why do scientists explore the ocean?", options: ["To find treasure", "To understand sea life", "To build houses"], correct: 1 },
            { q: "What equipment do divers need?", options: ["Oxygen tank", "Umbrella", "Bicycle"], correct: 0 },
            { q: "Why must oceans be protected?", options: ["To protect marine ecosystems", "To build malls", "To make ships faster"], correct: 0 },
            { q: "What is a coral reef?", options: ["A structure of polyps", "A giant wave", "A type of sand"], correct: 0 },
            { q: "Which gas do divers breathe from tanks?", options: ["Carbon Dioxide", "Oxygen", "Nitrogen"], correct: 1 },
            { q: "What is the 'ocean floor'?", options: ["The beach", "The bottom of the sea", "The surface of water"], correct: 1 },
            { q: "Pollution in the ocean is ____.", options: ["Good for fish", "Harmful to nature", "Helpful for divers"], correct: 1 },
            { q: "What is a submarine?", options: ["An underwater boat", "A fast airplane", "A racing car"], correct: 0 }
        ];

        const vocabList = {
            "coral reef": "Batu karang yang menjadi habitat hidupan laut.",
            "marine life": "Hidupan laut seperti ikan, penyu, dan mamalia laut.",
            "submarine": "Kapal selam untuk meneroka laut dalam.",
            "diver": "Penyelam yang menggunakan tangki oksigen.",
            "habitat": "Tempat tinggal semula jadi bagi hidupan.",
            "exploration": "Penerokaan untuk menemui perkara baharu.",
            "ocean floor": "Dasar laut yang paling bawah.",
            "ecosystem": "Interaksi antara hidupan dan persekitaran.",
            "underwater city": "Bandar buatan di bawah laut untuk penyelidikan."
        };

        // Fungsi Utama (Dibaiki untuk kepantasan)
        window.startAdventure = async () => {
            const nameIn = document.getElementById('input-name').value.trim();
            const classIn = document.getElementById('input-class').value.trim();
            
            if(!nameIn || !classIn) {
                alert("Sila masukkan nama dan kelas!");
                return;
            }

            studentName = nameIn;
            studentClass = classIn;

            // 1. TUKAR UI SERTA-MERTA (Jangan tunggu Firebase)
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            document.getElementById('ui-name').innerText = studentName;
            document.getElementById('ui-class').innerText = studentClass;
            generateBoard();

            // 2. URUSAN FIREBASE DI LATAR BELAKANG
            if (firebaseEnabled && auth) {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        signInWithCustomToken(auth, __initial_auth_token).catch(() => {});
                    } else {
                        signInAnonymously(auth).catch(() => {});
                    }
                } catch (e) {
                    console.log("Auth background silent fail.");
                }
            }
        };

        window.openTeacherDashboard = () => {
            document.getElementById('modal-password').classList.remove('hidden');
            document.getElementById('modal-password').classList.add('flex');
        };

        window.closePasswordModal = () => {
            document.getElementById('modal-password').classList.add('hidden');
            document.getElementById('modal-password').classList.remove('flex');
            document.getElementById('password-input').value = "";
        };

        window.verifyTeacherPassword = async () => {
            const input = document.getElementById('password-input').value;
            if (input === TEACHER_PASSWORD) {
                closePasswordModal();
                if (!firebaseEnabled) {
                    alert("Dashboard tidak tersedia di GitHub (Firebase tiada).");
                    return;
                }
                document.getElementById('screen-start').classList.add('hidden');
                document.getElementById('screen-teacher').classList.remove('hidden');
                fetchResults();
            } else {
                document.getElementById('password-error').classList.remove('hidden');
                setTimeout(() => document.getElementById('password-error').classList.add('hidden'), 2000);
            }
        };

        async function fetchResults() {
            if (!firebaseEnabled || !db) return;
            const list = document.getElementById('teacher-results-list');
            list.innerHTML = "<p class='text-center py-4'>Memuatkan data...</p>";
            
            try {
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'results'));
                let results = [];
                querySnapshot.forEach((doc) => results.push(doc.data()));
                results.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                if (results.length === 0) {
                    list.innerHTML = "<p class='text-center py-4 italic'>Tiada rekod.</p>";
                    return;
                }

                list.innerHTML = `
                    <table class="w-full text-left text-xs">
                        <thead class="bg-cyan-100">
                            <tr>
                                <th class="p-2">Nama</th>
                                <th class="p-2">Kelas</th>
                                <th class="p-2 text-center">Skor</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${results.map(r => `
                                <tr class="border-b">
                                    <td class="p-2 font-bold">${r.name}</td>
                                    <td class="p-2">${r.class}</td>
                                    <td class="p-2 text-center text-orange-600 font-bold">${r.score}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                list.innerHTML = "<p class='text-center text-red-500 py-4'>Ralat data.</p>";
            }
        }

        function generateBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const colors = ['bg-rose-500', 'bg-cyan-500', 'bg-emerald-500', 'bg-amber-400', 'bg-purple-500', 'bg-orange-500'];
            for (let i = 36; i >= 1; i--) {
                // Sederhanakan grid untuk kestabilan
                const cell = document.createElement('div');
                cell.id = `cell-${i}`;
                const colorClass = colors[i % colors.length];
                cell.className = `cell relative border border-white/20 flex items-center justify-center font-black text-white rounded shadow-sm ${colorClass}`;
                cell.innerHTML = `<span class="opacity-30 text-xs">${i}</span>`;
                
                if (snakes[i]) cell.innerHTML += `<div class="absolute text-xl">🐍</div>`;
                if (ladders[i]) cell.innerHTML += `<div class="absolute text-xl">🪜</div>`;
                if (questionTiles.includes(i)) cell.innerHTML += `<div class="absolute top-0 right-0 p-0.5">❓</div>`;
                if (vocabTiles.includes(i)) cell.innerHTML += `<div class="absolute top-0 right-0 p-0.5">📖</div>`;
                
                board.appendChild(cell);
            }
            updateToken();
        }

        function updateToken() {
            const cell = document.getElementById(`cell-${playerPos}`);
            if (!cell) return;
            const token = document.getElementById('player-token');
            const board = document.getElementById('board').getBoundingClientRect();
            const cRect = cell.getBoundingClientRect();
            token.style.left = (cRect.left - board.left + (cRect.width/2) - 15) + 'px';
            token.style.top = (cRect.top - board.top + (cRect.height/2) - 15) + 'px';
            document.getElementById('ui-pos').innerText = playerPos;
        }

        window.rollDice = () => {
            if(isRolling) return;
            isRolling = true;
            const val = Math.floor(Math.random() * 6) + 1;
            const dice = document.getElementById('dice-display');
            dice.classList.add('animate-bounce');
            setTimeout(() => {
                dice.classList.remove('animate-bounce');
                dice.innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][val-1];
                movePlayer(val);
            }, 600);
        };

        function movePlayer(steps) {
            playerPos = Math.min(playerPos + steps, boardSize);
            updateToken();
            setTimeout(checkTile, 600);
        }

        function checkTile() {
            if (questionTiles.includes(playerPos)) showQuestion();
            else if (vocabTiles.includes(playerPos)) showVocab();
            else applySnakesAndLadders();
        }

        function applySnakesAndLadders() {
            let moved = false;
            if(snakes[playerPos]) { playerPos = snakes[playerPos]; moved = true; }
            else if(ladders[playerPos]) { playerPos = ladders[playerPos]; moved = true; }
            if(moved) setTimeout(updateToken, 500);
            if(playerPos === boardSize) showEndScreen();
            else isRolling = false;
        }

        function showQuestion() {
            const modal = document.getElementById('modal-q');
            const q = questions[Math.floor(Math.random() * questions.length)];
            currentActiveQuestion = q;
            document.getElementById('q-text').innerText = q.q;
            const opts = document.getElementById('q-options');
            opts.innerHTML = '';
            document.getElementById('ai-explain-btn').classList.add('hidden');
            document.getElementById('ai-explanation-area').innerHTML = "";

            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "w-full p-3 text-left bg-gray-50 border-2 border-cyan-100 rounded-xl font-bold text-cyan-900";
                b.innerText = opt;
                b.onclick = () => submitAnswer(i === q.correct);
                opts.appendChild(b);
            });

            timerSeconds = 10;
            document.getElementById('timer-val').innerText = timerSeconds;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds--;
                document.getElementById('timer-val').innerText = timerSeconds;
                if(timerSeconds <= 0) { clearInterval(timerInterval); submitAnswer(false); }
            }, 1000);

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        async function submitAnswer(isCorrect) {
            clearInterval(timerInterval);
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');
            if(isCorrect) {
                score += 10;
                feedback.innerText = "BETUL! +10 Mata ⭐";
                feedback.className = "p-2 bg-green-500 text-white rounded-lg font-bold text-center";
                document.getElementById('ui-score').innerText = score;
                setTimeout(closeModalQ, 1500);
            } else {
                playerPos = Math.max(1, playerPos - 1);
                feedback.innerText = "SALAH! Undur 1 petak 🔙";
                feedback.className = "p-2 bg-red-500 text-white rounded-lg font-bold text-center";
                document.getElementById('ai-explain-btn').classList.remove('hidden');
            }
        }

        function closeModalQ() {
            document.getElementById('modal-q').classList.add('hidden');
            document.getElementById('modal-q').classList.remove('flex');
            document.getElementById('feedback').classList.add('hidden');
            updateToken();
            applySnakesAndLadders();
        }

        window.getAIExplanation = async () => {
            const area = document.getElementById('ai-explanation-area');
            area.innerHTML = "<p class='text-xs italic animate-pulse'>Penjelasan AI sedang dijana...</p>";
            const prompt = `Pelajar tersalah jawab soalan: "${currentActiveQuestion.q}". Jawapan betul ialah "${currentActiveQuestion.options[currentActiveQuestion.correct]}". Terangkan ringkas dalam 2 ayat Inggeris.`;
            const result = await callGemini(prompt, "Helpful marine guide.");
            area.innerHTML = `<div class='p-2 bg-cyan-50 border border-cyan-200 rounded text-xs mt-2'>${result}</div><button onclick="closeModalQ()" class="w-full mt-2 bg-cyan-600 text-white py-1 rounded text-xs">Teruskan</button>`;
        };

        window.getAIFact = async () => {
            const factBox = document.getElementById('ai-fact-box');
            factBox.innerText = "Mencari fakta...";
            const fact = await callGemini("Short fact about coral reefs. Max 15 words.", "Marine expert.");
            factBox.innerText = `✨ ${fact}`;
        };

        function showVocab() {
            const keys = Object.keys(vocabList);
            const word = keys[Math.floor(Math.random() * keys.length)];
            const modal = document.getElementById('modal-vocab');
            document.getElementById('v-word').innerText = word;
            document.getElementById('v-meaning').innerText = vocabList[word];
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        window.closeVocab = () => {
            document.getElementById('modal-vocab').classList.add('hidden');
            document.getElementById('modal-vocab').classList.remove('flex');
            applySnakesAndLadders();
        };

        async function showEndScreen() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            document.getElementById('end-name').innerText = studentName;
            document.getElementById('end-class').innerText = studentClass;
            document.getElementById('end-score').innerText = score;
            
            if(firebaseEnabled && db && auth.currentUser) {
                addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'results'), {
                    name: studentName, class: studentClass, score: score, timestamp: serverTimestamp()
                }).catch(() => {});
            }
        }

        window.resetGame = () => location.reload();
        window.takeScreenshot = () => {
            html2canvas(document.getElementById('win-card')).then(canvas => {
                const link = document.createElement('a');
                link.download = `Result_${studentName}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        };
    </script>
    <style>
        .cell { aspect-ratio: 1 / 1; }
        .ocean-bg { background: linear-gradient(180deg, #0ea5e9 0%, #0c4a6e 100%); }
        .bubble { position: absolute; background: rgba(255,255,255,0.2); border-radius: 50%; animation: rise linear infinite; pointer-events: none; }
        @keyframes rise { from { bottom: -20px; opacity: 0; } to { bottom: 100%; opacity: 0.8; } }
    </style>
</head>
<body class="ocean-bg min-h-screen flex items-center justify-center p-2 font-sans overflow-hidden">
    <div id="bubbles-container" class="fixed inset-0 pointer-events-none"></div>

    <!-- Modal Password -->
    <div id="modal-password" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-6 z-[60]">
        <div class="bg-white w-full max-w-xs rounded-2xl p-6 text-center space-y-4 shadow-xl">
            <h3 class="font-black text-cyan-900 uppercase">Akses Guru</h3>
            <input type="password" id="password-input" class="w-full p-2 bg-gray-100 border border-cyan-100 rounded text-center focus:outline-none">
            <p id="password-error" class="hidden text-red-500 text-xs">Kata laluan salah!</p>
            <div class="flex gap-2">
                <button onclick="closePasswordModal()" class="flex-1 bg-gray-200 py-2 rounded text-sm">Batal</button>
                <button onclick="verifyTeacherPassword()" class="flex-1 bg-cyan-600 text-white py-2 rounded text-sm font-bold">Masuk</button>
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="screen-start" class="relative z-10 bg-white p-6 rounded-[2.5rem] shadow-2xl max-w-xs w-full text-center border-4 border-cyan-400">
        <div class="text-6xl mb-2 animate-bounce">🤿</div>
        <h1 class="text-2xl font-black text-cyan-900 leading-none mb-1">CITIES BENEATH<br>THE SEA</h1>
        <p class="text-cyan-600 font-bold mb-6 text-xs uppercase tracking-widest">Wonders of Nature: AI Adventure</p>
        <div class="space-y-3">
            <input type="text" id="input-name" placeholder="Nama Anda" class="w-full p-3 bg-cyan-50 border border-cyan-100 rounded-xl font-bold outline-none">
            <input type="text" id="input-class" placeholder="Kelas (e.g. 3 Dynamic)" class="w-full p-3 bg-cyan-50 border border-cyan-100 rounded-xl font-bold outline-none">
            <button onclick="startAdventure()" class="w-full bg-orange-500 text-white font-black py-3 rounded-xl shadow-lg hover:bg-orange-600 transition text-lg">▶ MULA</button>
            <button onclick="openTeacherDashboard()" class="text-[10px] text-gray-400 underline">Dashboard Guru</button>
        </div>
    </div>

    <!-- Teacher Dashboard Screen -->
    <div id="screen-teacher" class="hidden relative z-10 bg-white p-6 rounded-[2rem] shadow-2xl max-w-sm w-full text-center border-4 border-cyan-700 max-h-[85vh] overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h2 class="font-black text-cyan-900">REKOD MARKAH</h2>
            <button onclick="resetGame()" class="text-xs text-red-500 font-bold uppercase">Tutup</button>
        </div>
        <div id="teacher-results-list" class="overflow-y-auto flex-1 rounded-lg"></div>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="hidden relative z-10 w-full max-w-4xl flex flex-col lg:flex-row gap-4 h-full max-h-[95vh]">
        <div class="lg:w-64 flex flex-col gap-2">
            <div class="bg-white/95 p-4 rounded-2xl shadow-lg border-2 border-cyan-400">
                <div class="flex items-center gap-2 mb-2 border-b pb-1">
                    <span class="text-2xl">🤿</span>
                    <div class="overflow-hidden leading-tight">
                        <p id="ui-name" class="font-black text-cyan-900 text-sm truncate"></p>
                        <p id="ui-class" class="text-[10px] font-bold text-cyan-600 truncate uppercase"></p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 text-center">
                    <div class="bg-cyan-50 p-1 rounded-lg"><p class="text-[9px] font-bold text-cyan-600">Skor</p><p id="ui-score" class="font-black text-cyan-900">0</p></div>
                    <div class="bg-orange-50 p-1 rounded-lg"><p class="text-[9px] font-bold text-orange-600">Petak</p><p id="ui-pos" class="font-black text-orange-900">1</p></div>
                </div>
            </div>
            <div class="bg-cyan-900/40 p-3 rounded-xl border border-white/20 text-white text-center">
                <button onclick="getAIFact()" class="w-full bg-yellow-400 text-cyan-950 font-black py-1 rounded text-[9px] mb-1">✨ FAKTA AI</button>
                <div id="ai-fact-box" class="text-[9px] italic leading-tight min-h-[30px] flex items-center justify-center">Ketahui rahsia lautan!</div>
            </div>
            <div class="mt-auto flex flex-col items-center pb-4">
                <div id="dice-display" class="text-6xl bg-white w-20 h-20 rounded-xl shadow-xl flex items-center justify-center border-4 border-cyan-400 mb-2 cursor-pointer" onclick="rollDice()">🎲</div>
                <p class="text-white font-black uppercase text-[10px] animate-pulse">Tekan Dadu</p>
            </div>
        </div>
        <div class="flex-1 relative bg-black/20 rounded-2xl p-2 border border-white/10">
            <div id="board" class="grid grid-cols-6 gap-1 h-full w-full"></div>
            <div id="player-token" class="absolute w-8 h-8 bg-yellow-300 border-2 border-black rounded-full shadow-lg z-30 transition-all duration-500 flex items-center justify-center text-lg">🤿</div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-q" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-xs rounded-2xl p-6 space-y-3 shadow-2xl border-4 border-cyan-400 relative">
            <div id="timer-box" class="text-center font-bold text-xs text-cyan-600">⏱ <span id="timer-val">10</span>s</div>
            <h2 id="q-text" class="text-sm font-black text-gray-800 leading-tight"></h2>
            <div id="q-options" class="space-y-2"></div>
            <div id="feedback" class="hidden"></div>
            <button id="ai-explain-btn" onclick="getAIExplanation()" class="hidden w-full text-[9px] font-bold text-cyan-600 underline">✨ AI Jelaskan Jawapan</button>
            <div id="ai-explanation-area"></div>
        </div>
    </div>

    <div id="modal-vocab" class="fixed inset-0 bg-cyan-900/90 hidden items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-xs rounded-2xl p-6 text-center space-y-3 border-4 border-orange-400">
            <div class="text-4xl">📖</div>
            <h2 id="v-word" class="text-xl font-black text-cyan-900 uppercase"></h2>
            <p id="v-meaning" class="text-sm text-cyan-700 italic font-bold"></p>
            <button onclick="closeVocab()" class="w-full bg-cyan-600 text-white font-black py-2 rounded-xl">FAHAM!</button>
        </div>
    </div>

    <div id="screen-end" class="hidden fixed inset-0 bg-cyan-900 flex flex-col items-center justify-center p-6 z-50 text-center">
        <div id="win-card" class="bg-white p-6 rounded-[2rem] shadow-2xl max-w-xs w-full border-4 border-yellow-400">
            <div class="text-6xl mb-2">🏆</div>
            <h1 class="text-2xl font-black text-cyan-900">TAMAT!</h1>
            <div class="my-3 bg-cyan-50 p-4 rounded-xl border">
                <p id="end-name" class="font-black text-cyan-900"></p>
                <p id="end-class" class="text-[10px] font-bold text-cyan-700 mb-2"></p>
                <div class="bg-white py-2 rounded-lg shadow-inner mb-2">
                    <p id="end-score" class="text-3xl font-black text-orange-500">0</p>
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <button onclick="takeScreenshot()" class="bg-emerald-600 text-white font-bold py-2 rounded text-xs">📸 SIMPAN KEPUTUSAN</button>
                <button onclick="resetGame()" class="text-cyan-600 font-bold text-xs underline">Main Semula</button>
            </div>
        </div>
    </div>

    <script>
        for(let i=0; i<10; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.style.left = Math.random()*100 + '%';
            b.style.width = b.style.height = (Math.random()*10 + 5) + 'px';
            b.style.animationDuration = (Math.random()*5 + 3) + 's';
            document.getElementById('bubbles-container').appendChild(b);
        }
    </script>
</body>
</html>
